services:
  db:
    image: postgres:18
    restart: unless-stopped
    labels:
      - "wud.watch=false"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial-audit}
      POSTGRES_USER: ${POSTGRES_USER:-financial-audit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financial-audit}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financial-audit}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/xhico/financial-audit:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    command:
      - gunicorn
      - config.wsgi:application
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "${GUNICORN_WORKERS:-3}"
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-False}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-0}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
      DJANGO_CONN_MAX_AGE: ${DJANGO_CONN_MAX_AGE:-60}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-financial-audit}
      POSTGRES_USER: ${POSTGRES_USER:-financial-audit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financial-audit}
    volumes:
      - static_data:/app/staticfiles
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/health/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  backup:
    image: postgres:18
    restart: unless-stopped
    profiles: [ "backup" ]
    labels:
      - "wud.watch=false"
    environment:
      PGHOST: db
      PGDATABASE: ${POSTGRES_DB:-financial-audit}
      PGUSER: ${POSTGRES_USER:-financial-audit}
      PGPASSWORD: ${POSTGRES_PASSWORD:-financial-audit}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-30}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /backups
        echo "[backup] started: interval=$${BACKUP_INTERVAL_SECONDS}s keep=$${BACKUP_KEEP_DAYS}d"
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          out="/backups/$${PGDATABASE}-$${ts}.sql.gz"
          echo "[backup] $$(date -Is) dumping to $${out}"
          if pg_dump --clean --if-exists | gzip > "$${out}.tmp"; then
            mv "$${out}.tmp" "$${out}"
            ln -sf "$$(basename "$${out}")" "/backups/$${PGDATABASE}-latest.sql.gz"
            echo "[backup] $$(date -Is) ok"
          else
            echo "[backup] $$(date -Is) FAILED" >&2
            rm -f "$${out}.tmp"
          fi
          find /backups -name "$${PGDATABASE}-*.sql.gz" -type f -mtime "+$${BACKUP_KEEP_DAYS}" -delete
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_data:
  backup_data:
