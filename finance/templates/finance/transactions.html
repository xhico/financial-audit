{% extends "finance/base.html" %}

{% block title %}Transactions{% endblock %}

{% block content %}
<h1>Transactions</h1>

<form class="filters" id="filters" onsubmit="event.preventDefault(); window.loadTxns(1);">
  <label>Scope
    <select name="scope">
      <option value="">All</option>
      <option value="personal">Personal</option>
      <option value="business">Business</option>
    </select>
  </label>
  <label>Kind
    <select name="kind">
      <option value="">All</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
      <option value="tax">Tax</option>
      <option value="transfer">Transfer</option>
      <option value="investment">Investment</option>
      <option value="other">Other</option>
    </select>
  </label>
  <label>Search
    <input name="q" type="search" placeholder="description">
  </label>
  <label>From <input name="date_from" type="date"></label>
  <label>To <input name="date_to" type="date"></label>
  <label style="flex-direction:row; align-items:center; gap:.4rem">
    <input name="uncategorised" type="checkbox" value="1">
    <span>Uncategorised only</span>
  </label>
  <button type="submit">Apply</button>
</form>

<section class="panel">
  <table class="data" id="txn-table">
    <thead>
      <tr>
        <th>Date</th><th>Account</th><th>Description</th>
        <th>Category</th><th class="num">Amount</th><th class="num">Balance</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
  </table>
  <div id="pager" style="display:flex; justify-content:space-between; align-items:center; margin-top:.75rem; color:var(--muted)">
    <span id="pager-status"></span>
    <span>
      <button type="button" id="prev-page" onclick="window.loadTxns(window.currentPage - 1)">‹ Prev</button>
      <button type="button" id="next-page" onclick="window.loadTxns(window.currentPage + 1)">Next ›</button>
    </span>
  </div>
</section>

<script>
  window.currentPage = 1;

  window.loadTxns = async function (page) {
    const d = window.dashboard;
    window.currentPage = Math.max(1, page);
    const form = document.getElementById("filters");
    const params = new URLSearchParams({ page: window.currentPage });
    for (const el of form.elements) {
      if (!el.name) continue;
      if (el.type === "checkbox") { if (el.checked) params.set(el.name, "1"); }
      else if (el.value) params.set(el.name, el.value);
    }
    const data = await d.fetchJson("/api/transactions/?" + params.toString());
    const tbody = document.querySelector("#txn-table tbody");
    if (!data.results.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">No transactions match.</td></tr>';
    } else {
      tbody.innerHTML = data.results.map(t => {
        const amt = parseFloat(t.amount);
        const bal = t.balance !== null ? d.formatCurrency(parseFloat(t.balance), true) : "—";
        const catTag = t.category
          ? `<span class="tag ${t.category.kind}">${t.category.name}</span>`
          : '<span class="tag other">uncategorised</span>';
        return `
          <tr>
            <td>${t.date}</td>
            <td>${t.account.name}<br><span style="color:var(--muted);font-size:.8em">${t.account.scope}</span></td>
            <td>${t.description}</td>
            <td>${catTag}</td>
            <td class="num ${amt >= 0 ? "positive" : "negative"}">${d.formatCurrency(amt, true)}</td>
            <td class="num">${bal}</td>
          </tr>`;
      }).join("");
    }
    const total = data.count;
    const pageSize = data.results.length;
    document.getElementById("pager-status").textContent =
      total === 0 ? "" : `Page ${window.currentPage} — ${pageSize} of ${total} transactions`;
    document.getElementById("prev-page").disabled = !data.previous;
    document.getElementById("next-page").disabled = !data.next;
  };

  window.addEventListener("load", () => window.loadTxns(1));
</script>
{% endblock %}
