{% extends "finance/base.html" %}

{% block title %}Transactions{% endblock %}

{% block content %}
<div class="flex items-end justify-between mb-6 flex-wrap gap-3">
  <div class="flex items-baseline gap-4 flex-wrap">
    <h1 class="text-3xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">Transactions</h1>
    <span class="text-sm text-zinc-500" id="pager-status"></span>
  </div>
  <div class="tab-group" id="view-tabs">
    <button type="button" data-view="all"      class="is-active">All</button>
    <button type="button" data-view="business">Business</button>
    <button type="button" data-view="personal">Personal</button>
  </div>
</div>

<form class="tile mb-3 flex flex-wrap gap-4 items-end" id="filters" onsubmit="event.preventDefault(); window.loadTxns(1);">
  <label class="filter-field hidden">Scope
    <select name="scope">
      <option value="">All</option>
      <option value="personal">Personal</option>
      <option value="business">Business</option>
    </select>
  </label>
  <label class="filter-field">Kind
    <select name="kind">
      <option value="">All</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
      <option value="tax">Tax</option>
      <option value="transfer">Transfer</option>
      <option value="investment">Investment</option>
      <option value="other">Other</option>
    </select>
  </label>
  <label class="filter-field flex-1 min-w-[180px]">Search
    <input name="q" type="search" placeholder="description, vendor, reference…">
  </label>
  <label class="filter-field">From <input name="date_from" type="date"></label>
  <label class="filter-field">To <input name="date_to" type="date"></label>
  <label class="text-xs font-medium text-zinc-600 flex items-center gap-2 pb-1.5">
    <input name="uncategorised" type="checkbox" value="1" class="w-4 h-4 accent-zinc-900">
    Uncategorised only
  </label>
  <button type="submit" class="btn-primary">Apply</button>
</form>

<div class="tile p-0 overflow-hidden">
  <table class="table-data">
    <thead>
      <tr>
        <th>Date</th><th>Account</th><th>Description</th>
        <th>Category</th><th class="num">Amount</th><th class="num">Balance</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="txn-tbody"><tr><td colspan="7" class="empty">Loading…</td></tr></tbody>
  </table>
  <div class="flex items-center justify-end gap-2 p-3 border-t border-zinc-100 bg-zinc-50/70">
    <button type="button" class="btn-ghost" id="prev-page" onclick="window.loadTxns(window.currentPage - 1)">‹ Prev</button>
    <button type="button" class="btn-ghost" id="next-page" onclick="window.loadTxns(window.currentPage + 1)">Next ›</button>
  </div>
</div>

<!-- Edit modal: hidden until a row's "edit" button is clicked -->
<div id="edit-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-zinc-900/60 p-4 overflow-y-auto">
  <div class="bg-white dark:bg-zinc-900 rounded-xl shadow-xl w-full max-w-2xl mx-auto my-auto p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-zinc-900 dark:text-zinc-100">Edit transaction</h2>
      <button type="button" id="edit-close" class="text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100">✕</button>
    </div>
    <form id="edit-form" class="grid gap-3">
      <input type="hidden" name="id">
      <label class="filter-field">Date
        <input name="date" type="date" required>
      </label>
      <label class="filter-field">Description
        <textarea name="description" rows="2" required class="resize-y"></textarea>
      </label>
      <div class="grid grid-cols-2 gap-3">
        <label class="filter-field">Amount
          <input name="amount" type="number" step="0.01" required>
        </label>
        <label class="filter-field">Balance
          <input name="balance" type="number" step="0.01">
        </label>
      </div>
      <label class="filter-field">Category
        <select name="category_id">
          <option value="">— Uncategorised —</option>
        </select>
      </label>

      <div class="border-t border-zinc-200 dark:border-zinc-800 pt-3 mt-1">
        <label class="flex items-center gap-2 text-sm font-medium text-zinc-700 dark:text-zinc-200">
          <input type="checkbox" name="apply_to_similar" class="w-4 h-4 accent-indigo-600">
          <span>Also apply to similar uncategorised</span>
        </label>
        <label class="filter-field mt-2">Match text
          <input name="match_text" type="text" autocomplete="off">
        </label>
        <div class="text-xs text-zinc-500 mt-1">Case-insensitive substring of the description; same matching rule the auto-classifier uses.</div>
        <div id="match-status" class="text-xs text-zinc-500 mt-2">—</div>
        <ul id="match-preview" class="mt-1 grid gap-1 max-h-40 overflow-y-auto text-xs"></ul>
      </div>

      <div id="edit-error" class="text-sm text-rose-600 hidden"></div>
      <div class="flex items-center justify-end gap-2 mt-2">
        <button type="button" id="edit-cancel" class="px-3 py-1.5 text-sm rounded-md text-zinc-600 hover:text-zinc-900 dark:hover:text-zinc-100">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
  window.currentPage = 1;
  window.categories = [];
  window.txnsById = {};

  function csrfToken() {
    return (document.cookie.match(/(?:^|; )csrftoken=([^;]+)/) || [])[1] || "";
  }

  async function loadCategories() {
    const d = window.dashboard;
    window.categories = await d.fetchJson("/api/categories/");
    const select = document.querySelector("#edit-form select[name='category_id']");
    // Group options by kind for readability
    const byKind = {};
    for (const c of window.categories) {
      (byKind[c.kind] ||= []).push(c);
    }
    let html = '<option value="">— Uncategorised —</option>';
    for (const kind of Object.keys(byKind).sort()) {
      html += `<optgroup label="${kind}">`;
      for (const c of byKind[kind]) html += `<option value="${c.id}">${c.name}</option>`;
      html += "</optgroup>";
    }
    select.innerHTML = html;
  }

  function guessMatchText(description) {
    // Strip common Portuguese bank prefixes and trailing reference numbers
    // so the default match text focuses on the vendor / payee.
    let text = (description || "").toUpperCase();
    text = text.replace(/^(COMPRA|COMPRAS|TRF|TFI|TRANSFERENCIA|TRANSFER|PAG\.|PAGAMENTO|DEB(\.|ITO)?|CRED(\.|ITO)?|MBWAY|MB WAY)\b\s*/i, "");
    // Drop trailing numeric or date-looking tokens
    text = text.replace(/\s+\d[\d/\-:.\s]*$/g, "");
    return text.trim().slice(0, 40);
  }

  function openEdit(t) {
    const form = document.getElementById("edit-form");
    form.elements.id.value          = t.id;
    form.elements.date.value        = t.date;
    form.elements.description.value = t.description;
    form.elements.amount.value      = t.amount;
    form.elements.balance.value     = t.balance ?? "";
    form.elements.category_id.value = t.category ? t.category.id : "";
    // Pre-fill the bulk-apply fields: guess at a useful substring, leave
    // the checkbox unchecked so saving without ticking doesn't surprise.
    form.elements.match_text.value  = guessMatchText(t.description);
    form.elements.apply_to_similar.checked = false;
    refreshMatchCount();
    document.getElementById("edit-error").classList.add("hidden");
    document.getElementById("edit-modal").classList.remove("hidden");
    document.getElementById("edit-modal").classList.add("flex");
  }

  // Debounced live preview of uncategorised rows matching the input. Shows
  // up to PREVIEW_LIMIT rows with a "and N more" tail so the user can see
  // exactly what the bulk apply is about to touch before ticking the box.
  const PREVIEW_LIMIT = 10;
  let matchCountTimer = null;
  async function refreshMatchCount() {
    const input  = document.querySelector("#edit-form input[name='match_text']");
    const status = document.getElementById("match-status");
    const list   = document.getElementById("match-preview");
    const text   = input.value.trim();
    if (!text) { status.textContent = ""; list.innerHTML = ""; return; }
    status.textContent = "Searching…";
    list.innerHTML = "";
    clearTimeout(matchCountTimer);
    matchCountTimer = setTimeout(async () => {
      try {
        const params = new URLSearchParams({
          q: text,
          uncategorised: "1",
          page_size: String(PREVIEW_LIMIT + 1),
        });
        const data = await window.dashboard.fetchJson("/api/transactions/?" + params.toString());
        // Discount the row currently being edited so the count reflects "other"
        // matches that the bulk apply would actually touch
        const editingId = parseInt(document.querySelector("#edit-form input[name='id']").value, 10);
        const editing   = window.txnsById[editingId];
        const editingMatches = editing && !editing.category &&
          editing.description.toLowerCase().includes(text.toLowerCase());
        const totalOthers = Math.max(0, data.count - (editingMatches ? 1 : 0));
        const rows = data.results.filter(r => r.id !== editingId).slice(0, PREVIEW_LIMIT);

        if (totalOthers === 0) {
          status.textContent = "No other uncategorised rows match.";
          list.innerHTML = "";
          return;
        }
        const more = totalOthers > rows.length ? ` (showing first ${rows.length})` : "";
        status.textContent = `${totalOthers} other uncategorised${more}`;
        const d = window.dashboard;
        list.innerHTML = rows.map(r => {
          const amt  = parseFloat(r.amount);
          const desc = r.description.length > 60 ? r.description.slice(0, 60) + "…" : r.description;
          const amtCls = amt >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400";
          return `
            <li class="flex items-baseline justify-between gap-3 px-2 py-1 rounded bg-zinc-50 dark:bg-zinc-800/40">
              <span class="text-zinc-500 whitespace-nowrap">${r.date}</span>
              <span class="flex-1 truncate" title="${r.description.replace(/"/g, "&quot;")}">${desc}</span>
              <span class="num tabular-nums ${amtCls}">${d.formatCurrency(amt, true)}</span>
            </li>`;
        }).join("");
      } catch (e) {
        status.textContent = "Failed to search.";
        list.innerHTML = "";
      }
    }, 200);
  }
  document.addEventListener("input", e => {
    if (e.target && e.target.name === "match_text") refreshMatchCount();
  });

  function closeEdit() {
    document.getElementById("edit-modal").classList.add("hidden");
    document.getElementById("edit-modal").classList.remove("flex");
  }

  document.getElementById("edit-close").addEventListener("click", closeEdit);
  document.getElementById("edit-cancel").addEventListener("click", closeEdit);
  document.getElementById("edit-modal").addEventListener("click", e => {
    // Click on backdrop (the modal container itself) closes; clicks inside the panel bubble up but stop here
    if (e.target.id === "edit-modal") closeEdit();
  });

  document.getElementById("edit-form").addEventListener("submit", async e => {
    e.preventDefault();
    const form = e.currentTarget;
    const id = form.elements.id.value;
    const categoryValue = form.elements.category_id.value === ""
      ? null
      : parseInt(form.elements.category_id.value, 10);
    const payload = {
      date: form.elements.date.value,
      description: form.elements.description.value,
      amount: form.elements.amount.value,
      balance: form.elements.balance.value === "" ? null : form.elements.balance.value,
      category_id: categoryValue,
    };
    const err = document.getElementById("edit-error");
    err.classList.add("hidden");
    try {
      const resp = await fetch(`/api/transactions/${id}/`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json", "X-CSRFToken": csrfToken() },
        credentials: "same-origin",
        body: JSON.stringify(payload),
      });
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        err.textContent = JSON.stringify(data) || `HTTP ${resp.status}`;
        err.classList.remove("hidden");
        return;
      }

      // Optional second hop: apply the same category to every other
      // uncategorised row whose description matches the substring.
      const applySimilar = form.elements.apply_to_similar.checked;
      const matchText    = form.elements.match_text.value.trim();
      if (applySimilar && matchText) {
        const bulkResp = await fetch("/api/transactions/categorise-matching/", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-CSRFToken": csrfToken() },
          credentials: "same-origin",
          body: JSON.stringify({
            match_text: matchText,
            category_id: categoryValue,
            only_uncategorised: true,
          }),
        });
        if (!bulkResp.ok) {
          const data = await bulkResp.json().catch(() => ({}));
          err.textContent = data.error || `Bulk apply failed: HTTP ${bulkResp.status}`;
          err.classList.remove("hidden");
          return;
        }
      }

      closeEdit();
      window.loadTxns(window.currentPage);
    } catch (e) {
      err.textContent = e.message;
      err.classList.remove("hidden");
    }
  });

  window.loadTxns = async function (page) {
    const d = window.dashboard;
    window.currentPage = Math.max(1, page);
    const form = document.getElementById("filters");
    const params = new URLSearchParams({ page: window.currentPage });
    for (const el of form.elements) {
      if (!el.name) continue;
      if (el.type === "checkbox") { if (el.checked) params.set(el.name, "1"); }
      else if (el.value) params.set(el.name, el.value);
    }
    const data = await d.fetchJson("/api/transactions/?" + params.toString());
    window.txnsById = {};
    const tbody = document.getElementById("txn-tbody");
    if (!data.results.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No transactions match.</td></tr>';
    } else {
      tbody.innerHTML = data.results.map(t => {
        window.txnsById[t.id] = t;
        const amt = parseFloat(t.amount);
        const bal = t.balance !== null ? d.formatCurrency(parseFloat(t.balance), true) : "—";
        const catTag = t.category
          ? `<span class="tag ${t.category.kind}">${t.category.name}</span>`
          : '<span class="tag transfer">uncategorised</span>';
        return `
          <tr>
            <td class="whitespace-nowrap text-zinc-500">${t.date}</td>
            <td>
              <div class="font-medium">${t.account.name}</div>
              <div class="text-xs text-zinc-500">${t.account.scope}</div>
            </td>
            <td class="max-w-md truncate" title="${t.description.replace(/"/g, "&quot;")}">${t.description}</td>
            <td>${catTag}</td>
            <td class="num font-medium ${amt >= 0 ? "text-emerald-600" : "text-rose-600"}">${d.formatCurrency(amt, true)}</td>
            <td class="num text-zinc-500">${bal}</td>
            <td class="num"><button type="button" data-edit="${t.id}" class="text-xs text-indigo-600 hover:text-indigo-500">edit</button></td>
          </tr>`;
      }).join("");
      tbody.querySelectorAll("button[data-edit]").forEach(btn => {
        btn.addEventListener("click", () => openEdit(window.txnsById[btn.dataset.edit]));
      });
    }
    const total = data.count;
    const shown = data.results.length;
    document.getElementById("pager-status").textContent =
      total === 0 ? "" : `Page ${window.currentPage} — showing ${shown} of ${total}`;
    document.getElementById("prev-page").disabled = !data.previous;
    document.getElementById("next-page").disabled = !data.next;
  };

  window.addEventListener("load", async () => {
    const scopeSelect = document.querySelector('#filters select[name="scope"]');
    document.querySelectorAll("#view-tabs button").forEach(b => {
      b.addEventListener("click", () => {
        document.querySelectorAll("#view-tabs button").forEach(x => x.classList.toggle("is-active", x === b));
        // Drive the hidden scope filter from the tab and re-fetch
        scopeSelect.value = b.dataset.view === "all" ? "" : b.dataset.view;
        window.loadTxns(1);
      });
    });
    await loadCategories();
    window.loadTxns(1);
  });
</script>
{% endblock %}
