{% load static %}
<!DOCTYPE html>
<html lang="en-gb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dashboard{% endblock %} — FinancialAudit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        background:
          radial-gradient(900px 600px at 100% -10%, rgba(99,102,241,0.07), transparent 60%),
          radial-gradient(800px 500px at -10% 110%, rgba(16,185,129,0.06), transparent 60%),
          theme(colors.slate.50);
      }
    }
    @layer components {
      .nav-link {
        @apply px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 whitespace-nowrap transition;
      }
      .nav-link.is-active { @apply bg-indigo-50 text-indigo-700; }

      .kpi-card {
        @apply bg-white border border-slate-200 rounded-xl px-5 py-4 transition hover:shadow-md hover:-translate-y-px;
      }
      .kpi-label { @apply text-xs font-semibold uppercase tracking-wider text-slate-500; }
      .kpi-value { @apply text-2xl font-bold tracking-tight tabular-nums mt-1 text-slate-900; }
      .kpi-sub   { @apply text-xs text-slate-400 mt-1; }

      .panel    { @apply bg-white border border-slate-200 rounded-xl p-6 transition hover:shadow-md; }
      .panel h2 { @apply text-base font-semibold tracking-tight mb-4 text-slate-900; }

      .chart-wrap      { @apply relative; height: 320px; }
      .chart-wrap.tall { height: 440px; }

      .table-data { @apply w-full border-collapse text-sm; }
      .table-data th {
        @apply text-left py-2 px-3 border-b border-slate-200 text-[0.7rem] font-semibold uppercase tracking-wider text-slate-500;
      }
      .table-data td {
        @apply py-3 px-3 border-b border-slate-100 align-top text-slate-900;
      }
      .table-data tbody tr:last-child td { @apply border-b-0; }
      .table-data tbody tr:hover td      { @apply bg-slate-50; }
      .table-data .num                   { @apply text-right tabular-nums; }

      .tag             { @apply inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold; }
      .tag.income      { @apply bg-emerald-50  text-emerald-700; }
      .tag.expense     { @apply bg-rose-50     text-rose-700; }
      .tag.transfer    { @apply bg-slate-200   text-slate-600; }
      .tag.investment  { @apply bg-violet-50   text-violet-700; }
      .tag.tax         { @apply bg-amber-50    text-amber-700; }
      .tag.other       { @apply bg-indigo-50   text-indigo-700; }
      .tag.personal    { @apply bg-sky-50      text-sky-700; }
      .tag.business    { @apply bg-fuchsia-50  text-fuchsia-700; }

      .filter-field { @apply text-xs font-medium text-slate-500 flex flex-col gap-1; }
      .filter-input,
      .filter-field input,
      .filter-field select {
        @apply px-3 py-1.5 border border-slate-200 rounded-md bg-white text-sm text-slate-900 transition focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500;
      }

      .btn-primary {
        @apply px-4 py-2 bg-indigo-600 text-white rounded-md text-sm font-semibold transition hover:bg-indigo-500 active:scale-[0.98] shadow-md shadow-indigo-500/25;
      }
      .btn-ghost {
        @apply px-3 py-1.5 bg-white text-slate-700 border border-slate-200 rounded-md text-sm font-medium transition hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed;
      }

      .empty { @apply text-center text-slate-400 py-10 text-sm; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="{% static 'finance/dashboard.js' %}" defer></script>
</head>
<body class="text-slate-900 antialiased font-sans">
<div class="grid min-h-screen md:grid-cols-[240px_1fr]">

  <aside class="md:sticky md:top-0 md:h-screen bg-white/80 backdrop-blur border-b md:border-b-0 md:border-r border-slate-200 p-4 md:p-6 flex md:flex-col gap-3 items-center md:items-stretch">
    <a class="flex items-center gap-2 md:pb-4 font-semibold tracking-tight text-slate-900" href="{% url 'pages:overview' %}">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-500 text-white grid place-items-center font-bold shadow-lg shadow-indigo-500/30">€</span>
      <span>FinancialAudit</span>
    </a>
    <nav class="flex md:flex-col gap-1 overflow-x-auto md:overflow-visible flex-1">
      <a href="{% url 'pages:overview' %}"     class="nav-link {% if request.resolver_match.url_name == 'overview' %}is-active{% endif %}">Overview</a>
      <a href="{% url 'pages:income' %}"       class="nav-link {% if request.resolver_match.url_name == 'income' %}is-active{% endif %}">Income</a>
      <a href="{% url 'pages:expenses' %}"     class="nav-link {% if request.resolver_match.url_name == 'expenses' %}is-active{% endif %}">Expenses</a>
      <a href="{% url 'pages:cashflow' %}"     class="nav-link {% if request.resolver_match.url_name == 'cashflow' %}is-active{% endif %}">Cashflow</a>
      <a href="{% url 'pages:net-worth' %}"    class="nav-link {% if request.resolver_match.url_name == 'net-worth' %}is-active{% endif %}">Net worth</a>
      <a href="{% url 'pages:accounts' %}"     class="nav-link {% if request.resolver_match.url_name == 'accounts' %}is-active{% endif %}">Accounts</a>
      <a href="{% url 'pages:transactions' %}" class="nav-link {% if request.resolver_match.url_name == 'transactions' %}is-active{% endif %}">Transactions</a>
    </nav>
    <div class="hidden md:block md:pt-4 md:border-t md:border-slate-200 text-xs text-slate-500">
      <div class="flex items-center gap-2 mb-1.5 text-slate-900 font-medium">
        <span class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 grid place-items-center text-[0.7rem] font-bold">{{ request.user.username|slice:":1"|upper }}</span>
        <span>{{ request.user.username }}</span>
      </div>
      <a href="/admin/" class="text-indigo-600 hover:underline">Admin</a>
      <span class="text-slate-300">·</span>
      <a href="/admin/logout/" class="text-indigo-600 hover:underline">Sign out</a>
    </div>
  </aside>

  <main class="px-6 py-8 md:px-10 md:py-10 max-w-7xl w-full">
    <div class="space-y-6">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>
</body>
</html>
