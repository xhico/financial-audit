{% extends "finance/base.html" %}

{% block title %}Cashflow{% endblock %}

{% block content %}
<div class="flex items-end justify-between mb-6 flex-wrap gap-3">
  <h1 class="text-3xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">Cashflow</h1>
  <div class="tab-group" id="cf-view-tabs">
    <button type="button" data-view="all"      class="is-active">All</button>
    <button type="button" data-view="business">Business</button>
    <button type="button" data-view="personal">Personal</button>
  </div>
</div>

<div class="grid grid-cols-12 gap-3">

  <div class="tile income col-span-12 md:col-span-4">
    <div class="tile-label">Total income</div>
    <div class="stat-num" id="kpi-income">—</div>
  </div>
  <div class="tile expenses col-span-12 md:col-span-4">
    <div class="tile-label">Total expenses</div>
    <div class="stat-num" id="kpi-expenses">—</div>
  </div>
  <div class="tile accent col-span-12 md:col-span-4">
    <div class="tile-label">Net cashflow</div>
    <div class="stat-num" id="kpi-net">—</div>
  </div>

  <div class="tile col-span-12">
    <div class="tile-label mb-3" id="chart-label">Monthly income vs expenses</div>
    <div class="chart-wrap tall"><canvas id="cashflow-chart"></canvas></div>
  </div>

  <div class="tile col-span-12">
    <div class="tile-label mb-3">Monthly totals</div>
    <table class="table-data">
      <thead><tr><th>Month</th><th class="num">Income</th><th class="num">Expenses</th><th class="num">Net</th></tr></thead>
      <tbody id="cashflow-tbody"><tr><td colspan="4" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>

</div>

<script>
  let chart = null;
  let scopes = {};
  let currentView = "all";

  function viewLabel() {
    return ({ all: "Combined", business: "Business", personal: "Personal" })[currentView];
  }

  function applyView(view) {
    currentView = view;
    document.querySelectorAll("#cf-view-tabs button").forEach(b => {
      b.classList.toggle("is-active", b.dataset.view === view);
    });
    render();
  }

  function render() {
    const d = window.dashboard;
    const data = scopes[currentView] || [];

    const totalIn  = data.reduce((s, r) => s + r.income, 0);
    const totalOut = data.reduce((s, r) => s + r.expenses, 0);
    const net = totalIn - totalOut;

    document.getElementById("kpi-income").textContent   = d.formatCurrency(totalIn);
    document.getElementById("kpi-expenses").textContent = d.formatCurrency(-totalOut);
    const netEl = document.getElementById("kpi-net");
    netEl.textContent = d.formatCurrency(net);
    netEl.classList.remove("text-emerald-700", "text-rose-700", "dark:text-emerald-300", "dark:text-rose-300");
    netEl.classList.add(net >= 0 ? "text-emerald-700" : "text-rose-700");
    netEl.classList.add(net >= 0 ? "dark:text-emerald-300" : "dark:text-rose-300");

    document.getElementById("chart-label").textContent = `${viewLabel()} — monthly income vs expenses`;

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("cashflow-chart"), {
      type: "bar",
      data: {
        labels: data.map(r => r.period),
        datasets: [
          { label: "Income",   data: data.map(r => r.income),    backgroundColor: d.accents.income },
          { label: "Expenses", data: data.map(r => -r.expenses), backgroundColor: d.accents.expense },
          { label: "Net",      data: data.map(r => r.net), type: "line", borderColor: d.accents.accent, pointRadius: 0, tension: 0.25 },
        ],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom" } } },
    });

    const tbody = document.getElementById("cashflow-tbody");
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No cashflow data yet for this view.</td></tr>';
    } else {
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${r.period}</td>
          <td class="num text-emerald-600 dark:text-emerald-400">${d.formatCurrency(r.income, true)}</td>
          <td class="num text-rose-600 dark:text-rose-400">${d.formatCurrency(-r.expenses, true)}</td>
          <td class="num font-semibold ${r.net >= 0 ? "text-emerald-600 dark:text-emerald-400" : "text-rose-600 dark:text-rose-400"}">${d.formatCurrency(r.net, true)}</td>
        </tr>`).join("");
    }
  }

  window.addEventListener("load", async () => {
    const d = window.dashboard;
    scopes = await d.fetchJson("/api/dashboard/cashflow/");
    document.querySelectorAll("#cf-view-tabs button").forEach(b => {
      b.addEventListener("click", () => applyView(b.dataset.view));
    });
    applyView("all");
  });
</script>
{% endblock %}
