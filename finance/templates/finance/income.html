{% extends "finance/base.html" %}

{% block title %}Income{% endblock %}

{% block content %}
<div class="flex items-end justify-between mb-6 flex-wrap gap-3">
  <h1 class="text-3xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">Income</h1>
  <div class="tab-group" id="view-tabs">
    <button type="button" data-view="all"      class="is-active">All</button>
    <button type="button" data-view="business">Business</button>
    <button type="button" data-view="personal">Personal</button>
  </div>
</div>

<div class="grid grid-cols-12 gap-3">

  <div class="tile income col-span-12 md:col-span-4 flex flex-col justify-between">
    <div>
      <div class="tile-label">Total income</div>
      <div class="stat-num hero" id="kpi-total">—</div>
    </div>
    <div class="text-sm text-emerald-700 dark:text-emerald-300 mt-2" id="kpi-months">—</div>
  </div>

  <div class="tile col-span-12 md:col-span-8">
    <div class="tile-label mb-3">Monthly income</div>
    <div class="chart-wrap tall"><canvas id="income-monthly-chart"></canvas></div>
  </div>

  <div class="tile col-span-12 md:col-span-7">
    <div class="tile-label mb-3">Quarterly income</div>
    <div class="chart-wrap"><canvas id="income-quarterly-chart"></canvas></div>
  </div>

  <div class="tile col-span-12 md:col-span-5">
    <div class="tile-label mb-3">Monthly totals</div>
    <div class="max-h-[300px] overflow-auto">
      <table class="table-data">
        <thead><tr><th>Month</th><th class="num">Income</th></tr></thead>
        <tbody id="income-tbody"><tr><td colspan="2" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  let monthlyChart = null;
  let quarterlyChart = null;
  let scopes = {};
  let currentView = "all";

  function applyView(view) {
    currentView = view;
    document.querySelectorAll("#view-tabs button").forEach(b => {
      b.classList.toggle("is-active", b.dataset.view === view);
    });
    render();
  }

  function render() {
    const d = window.dashboard;
    const data = scopes[currentView] || { monthly: [], quarterly: [] };

    const total = data.monthly.reduce((s, r) => s + r.income, 0);
    document.getElementById("kpi-total").textContent  = d.formatCurrency(total);
    document.getElementById("kpi-months").textContent = `Across ${data.monthly.length} months`;

    if (monthlyChart) monthlyChart.destroy();
    monthlyChart = new Chart(document.getElementById("income-monthly-chart"), {
      type: "bar",
      data: {
        labels: data.monthly.map(r => r.period),
        datasets: [{ label: "Income", data: data.monthly.map(r => r.income), backgroundColor: d.accents.income }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
    });

    if (quarterlyChart) quarterlyChart.destroy();
    quarterlyChart = new Chart(document.getElementById("income-quarterly-chart"), {
      type: "bar",
      data: {
        labels: data.quarterly.map(r => r.period),
        datasets: [{ label: "Income", data: data.quarterly.map(r => r.income), backgroundColor: d.accents.accent }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
    });

    const tbody = document.getElementById("income-tbody");
    if (!data.monthly.length) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty">No income in this view.</td></tr>';
    } else {
      tbody.innerHTML = data.monthly.map(r => `
        <tr><td>${r.period}</td><td class="num text-emerald-600 dark:text-emerald-400 font-medium">${d.formatCurrency(r.income, true)}</td></tr>`).join("");
    }
  }

  window.addEventListener("load", async () => {
    const d = window.dashboard;
    scopes = await d.fetchJson("/api/dashboard/income/");
    document.querySelectorAll("#view-tabs button").forEach(b => {
      b.addEventListener("click", () => applyView(b.dataset.view));
    });
    applyView("all");
  });
</script>
{% endblock %}
