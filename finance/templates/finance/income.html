{% extends "finance/base.html" %}

{% block title %}Income{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold tracking-tight text-zinc-100">Income</h1>

<section class="panel">
  <h2>Monthly income</h2>
  <div class="chart-wrap"><canvas id="income-monthly-chart"></canvas></div>
</section>

<section class="panel">
  <h2>Quarterly income</h2>
  <div class="chart-wrap"><canvas id="income-quarterly-chart"></canvas></div>
</section>

<section class="panel">
  <h2>Monthly totals</h2>
  <div class="max-w-md">
    <table class="table-data">
      <thead><tr><th>Month</th><th class="num">Income</th></tr></thead>
      <tbody id="income-tbody"><tr><td colspan="2" class="empty">Loading…</td></tr></tbody>
    </table>
  </div>
</section>

<script>
  window.addEventListener("load", async () => {
    const d = window.dashboard;
    const data = await d.fetchJson("/api/dashboard/income/");

    new Chart(document.getElementById("income-monthly-chart"), {
      type: "bar",
      data: {
        labels: data.monthly.map(r => r.period),
        datasets: [{ label: "Income", data: data.monthly.map(r => r.income), backgroundColor: "#34d399" }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
    });

    new Chart(document.getElementById("income-quarterly-chart"), {
      type: "bar",
      data: {
        labels: data.quarterly.map(r => r.period),
        datasets: [{ label: "Income", data: data.quarterly.map(r => r.income), backgroundColor: "#818cf8" }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } },
    });

    const tbody = document.getElementById("income-tbody");
    if (!data.monthly.length) {
      tbody.innerHTML = '<tr><td colspan="2" class="empty">No income recorded yet.</td></tr>';
    } else {
      tbody.innerHTML = data.monthly.map(r => `
        <tr><td>${r.period}</td><td class="num text-emerald-400 font-medium">${d.formatCurrency(r.income, true)}</td></tr>`).join("");
    }
  });
</script>
{% endblock %}
