{% extends "finance/base.html" %}

{% block title %}Accounts{% endblock %}

{% block content %}
<div class="flex items-end justify-between mb-6 flex-wrap gap-3">
  <h1 class="text-3xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100">Accounts</h1>
  <div class="tab-group" id="view-tabs">
    <button type="button" data-view="all"      class="is-active">All</button>
    <button type="button" data-view="business">Business</button>
    <button type="button" data-view="personal">Personal</button>
  </div>
</div>

<div id="account-cards" class="grid grid-cols-12 gap-3 mb-3">
  <div class="tile col-span-12 empty">Loading…</div>
</div>

<div class="tile col-span-12">
  <div class="tile-label mb-3">All accounts</div>
  <table class="table-data">
    <thead>
      <tr>
        <th>Account</th><th>Bank</th><th>Scope</th><th>Kind</th>
        <th>IBAN</th><th class="num">Balance</th><th>Last movement</th>
      </tr>
    </thead>
    <tbody id="accounts-tbody"><tr><td colspan="7" class="empty">Loading…</td></tr></tbody>
  </table>
</div>

<script>
  let allAccounts = [];
  let currentView = "all";

  function applyView(view) {
    currentView = view;
    document.querySelectorAll("#view-tabs button").forEach(b => {
      b.classList.toggle("is-active", b.dataset.view === view);
    });
    render();
  }

  function render() {
    const d = window.dashboard;
    const visible = currentView === "all" ? allAccounts : allAccounts.filter(a => a.scope === currentView);

    const cards = document.getElementById("account-cards");
    if (!visible.length) {
      cards.innerHTML = '<div class="tile col-span-12 empty">No accounts in this view.</div>';
    } else {
      cards.innerHTML = visible.map(a => {
        const tone = a.scope === "business" ? "business" : "accent";
        return `
          <div class="tile ${tone} col-span-12 md:col-span-4">
            <div class="flex items-baseline justify-between">
              <div class="tile-label">${a.scope}</div>
              <div class="text-xs text-zinc-500">${a.bank}</div>
            </div>
            <div class="font-medium mt-2">${a.name}</div>
            <div class="stat-num mt-1">${a.balance === null ? "—" : d.formatCurrency(a.balance, true)}</div>
            <div class="text-xs text-zinc-500 mt-2">Last movement ${a.last_movement || "—"}</div>
          </div>`;
      }).join("");
    }

    const tbody = document.getElementById("accounts-tbody");
    if (!visible.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No accounts in this view.</td></tr>';
      return;
    }
    tbody.innerHTML = visible.map(a => `
      <tr>
        <td class="font-medium">${a.name}</td>
        <td class="text-zinc-500">${a.bank}</td>
        <td><span class="tag ${a.scope}">${a.scope}</span></td>
        <td class="text-zinc-500">${a.kind}</td>
        <td class="text-xs tabular-nums text-zinc-500">${a.iban}</td>
        <td class="num">${a.balance === null ? "—" : d.formatCurrency(a.balance, true)}</td>
        <td class="text-zinc-500">${a.last_movement || "—"}</td>
      </tr>`).join("");
  }

  window.addEventListener("load", async () => {
    const d = window.dashboard;
    allAccounts = await d.fetchJson("/api/dashboard/accounts/");
    document.querySelectorAll("#view-tabs button").forEach(b => {
      b.addEventListener("click", () => applyView(b.dataset.view));
    });
    applyView("all");
  });
</script>
{% endblock %}
